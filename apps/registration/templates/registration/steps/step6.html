<!-- ── STEP 6: Payment ── -->
<div class="step-content" id="step6" style="display:none">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">💳</div>
      <div>
        <div class="card-title">Registration Fee Payment</div>
        <div class="card-subtitle">Complete payment to submit your application</div>
      </div>
    </div>

    <div id="paymentForm">
      <div class="payment-summary">
        <div class="payment-row"><span>Application Processing Fee</span><span class="amount">₹400</span></div>
        <div class="payment-row"><span>Portal Convenience Fee</span><span class="amount">₹75</span></div>
        <div class="payment-row"><span>GST (18%)</span><span class="amount">₹25</span></div>
        <div class="payment-row"><span style="font-family:'Syne',sans-serif">Total Amount</span><span class="total-amount">₹500</span></div>
      </div>

      <label style="font-size:12px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:block">Payment Method</label>
      <div class="payment-methods">
        <button class="pay-method active" onclick="selectPayMethod(this)">🏦 Net Banking</button>
        <button class="pay-method" onclick="selectPayMethod(this)">💳 Debit/Credit Card</button>
        <button class="pay-method" onclick="selectPayMethod(this)">📱 UPI</button>
        <button class="pay-method" onclick="selectPayMethod(this)">💰 Challan</button>
      </div>

      <button class="btn-pay" id="payBtn" onclick="simulatePayment()">🔒 Proceed to Pay ₹500</button>
    </div>

    <div class="spinner-overlay" id="spinnerOverlay">
      <div class="spinner"></div>
      <div class="spinner-text" id="spinnerText">Connecting to payment gateway...</div>
    </div>

    <div class="payment-success" id="paymentSuccess">
      <div class="success-icon">✅</div>
      <div style="font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--green-light)">Payment Successful!</div>
      <div class="txn-box">Transaction ID: <strong id="txnId"></strong></div>
      <div style="font-size:13px;color:var(--gray)">₹500 paid successfully via Government Payment Gateway</div>
    </div>

    <div class="btn-row" id="submitRow" style="display:none">
      <button class="btn btn-outline" onclick="prevStep(6)">← Back</button>
      <button class="btn btn-success" id="submitBtn" onclick="submitForm()">🚀 Submit Application</button>
    </div>
    <div id="backBeforePay" class="btn-row">
      <button class="btn btn-outline" onclick="prevStep(6)">← Back</button>
    </div>
  </div>
</div>
