<!-- ── STEP 2: Address ── -->
<div class="step-content" id="step2" style="display:none">
  <div class="card">
    <div class="card-header">
      <div class="card-icon">📍</div>
      <div>
        <div class="card-title">Address Details</div>
        <div class="card-subtitle">Your current residential address</div>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>State <span class="req">*</span></label>
        <select id="state">
          <option value="">-- Select State --</option>
          <option>Andhra Pradesh</option><option>Arunachal Pradesh</option>
          <option>Assam</option><option>Bihar</option><option>Chhattisgarh</option>
          <option>Goa</option><option>Gujarat</option><option>Haryana</option>
          <option>Himachal Pradesh</option><option>Jharkhand</option>
          <option>Karnataka</option><option>Kerala</option>
          <option>Madhya Pradesh</option><option>Maharashtra</option>
          <option>Manipur</option><option>Meghalaya</option><option>Mizoram</option>
          <option>Nagaland</option><option>Odisha</option><option>Punjab</option>
          <option>Rajasthan</option><option>Sikkim</option><option>Tamil Nadu</option>
          <option>Telangana</option><option>Tripura</option>
          <option>Uttar Pradesh</option><option>Uttarakhand</option>
          <option>West Bengal</option><option>Delhi (NCT)</option>
          <option>Jammu & Kashmir</option><option>Ladakh</option>
        </select>
        <span class="error-msg" id="err-state">Please select a state</span>
      </div>
      <div class="form-group">
        <label>District <span class="req">*</span></label>
        <input type="text" id="district" placeholder="Your district">
        <span class="error-msg" id="err-district">Please enter district</span>
      </div>
      <div class="form-group full">
        <label>Full Address <span class="req">*</span></label>
        <textarea id="address" placeholder="House/Flat No., Street, Locality, City..."></textarea>
        <span class="error-msg" id="err-address">Please enter your full address</span>
      </div>
      <div class="form-group">
        <label>Pincode <span class="req">*</span></label>
        <input type="text" id="pincode" placeholder="6-digit PIN code" maxlength="6">
        <span class="error-msg" id="err-pincode">Enter valid 6-digit pincode</span>
      </div>
      <div class="form-group">
        <label>Nationality</label>
        <select id="nationality">
          <option value="Indian" selected>Indian</option>
          <option>Other</option>
        </select>
      </div>

      <div class="subsection-title">Communication Blocks</div>
      <div class="form-group">
        <label>Preferred Language</label>
        <select id="preferredLanguage">
          <option>English</option>
          <option>Hindi</option>
          <option>Tamil</option>
          <option>Telugu</option>
          <option>Bengali</option>
          <option>Marathi</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nearest Exam City</label>
        <input type="text" id="examCity" placeholder="Preferred city for exam center">
      </div>
      <div class="form-group full">
        <label>Alternate Address / Landmark</label>
        <textarea id="landmark" placeholder="Landmark, alternate contact address, or delivery note"></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="prevStep(2)">← Back</button>
      <button class="btn btn-primary" onclick="nextStep(2)">Next: Education →</button>
    </div>
  </div>
</div>
