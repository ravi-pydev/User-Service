<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page_title }} | Registration Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0A1628;
    --navy-mid: #122040;
    --navy-light: #1A3260;
    --saffron: #FF6B1A;
    --gold: #FFB347;
    --green: #138808;
    --green-light: #1DB010;
    --white: #F8F9FC;
    --gray: #8A95A8;
    --error: #E53E3E;
    --card-bg: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 15% 10%, rgba(255,107,26,.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 85% 90%, rgba(19,136,8,.14) 0%, transparent 55%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(26,50,96,.6) 0%, transparent 70%),
      var(--navy);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .header {
    position: relative; z-index: 10;
    background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
    border-bottom: 2px solid var(--saffron);
    padding: 20px 24px;
    text-align: center;
  }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--saffron), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .container {
    position: relative; z-index: 5;
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }
  .progress-wrapper { margin-bottom: 32px; }
  .steps-row {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: auto;
  }
  .step-item {
    display: flex;
    flex: 1;
    min-width: 60px;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    position: relative;
    text-decoration: none;
    color: inherit;
  }
  .step-item:not(:last-child)::after {
    content: '';
    position: absolute;
    top: 18px;
    left: calc(50% + 18px);
    width: calc(100% - 36px);
    height: 2px;
    background: var(--border);
    z-index: 0;
  }
  .step-item.done:not(:last-child)::after { background: var(--saffron); }
  .step-item::before {
    content: attr(data-tooltip);
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(26,50,96,.95);
    border: 1px solid var(--border);
    color: #fff;
    font-size: 10px;
    white-space: nowrap;
    padding: 3px 8px;
    border-radius: 5px;
    opacity: 0;
    transition: opacity .2s;
  }
  .step-item:hover::before { opacity: 1; }
  .step-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--navy-mid);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--gray);
    position: relative;
    z-index: 1;
    transition: all .25s;
  }
  .step-label {
    font-size: 12px;
    color: var(--gray);
    text-align: center;
    white-space: nowrap;
  }
  .step-item.active .step-dot {
    border-color: var(--saffron);
    background: var(--saffron);
    color: #fff;
    box-shadow: 0 0 16px rgba(255,107,26,.5);
  }
  .step-item.active .step-label { color: var(--saffron); font-weight: 600; }
  .step-item.done .step-dot {
    border-color: var(--green);
    background: var(--green);
    color: #fff;
  }
  .step-item.done .step-label { color: var(--green); }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 60px rgba(0,0,0,.3);
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .card-icon {
    width: 46px;
    height: 46px;
    background: linear-gradient(135deg, var(--saffron), var(--gold));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }
  .card-subtitle { font-size: 13px; color: var(--gray); margin-top: 2px; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--gray);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  label .req { color: var(--saffron); }
  input, select, textarea, button {
    font-family: 'DM Sans', sans-serif;
  }
  input, select, textarea {
    background: rgba(255,255,255,.06);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--white);
    font-size: 14px;
    outline: none;
    transition: all .25s;
    width: 100%;
    appearance: none;
  }
  select option { background: var(--navy-mid); color: var(--white); }
  textarea { resize: vertical; min-height: 90px; }
  input::placeholder, textarea::placeholder { color: rgba(255,255,255,.25); }
  input:focus, select:focus, textarea:focus {
    border-color: var(--saffron);
    background: rgba(255,107,26,.07);
    box-shadow: 0 0 0 3px rgba(255,107,26,.15);
  }
  input.error, select.error, textarea.error {
    border-color: var(--error);
    box-shadow: 0 0 0 3px rgba(229,62,62,.12);
  }
  .error-msg {
    font-size: 11px;
    color: var(--error);
    display: none;
  }
  .error-msg.show { display: block; }

  .radio-group, .check-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .radio-btn input, .check-btn input { display: none; }
  .radio-btn label, .check-btn label {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--gray);
    text-transform: none;
    letter-spacing: 0;
    transition: all .2s;
    background: rgba(255,255,255,.03);
  }
  .radio-btn input:checked + label,
  .check-btn input:checked + label {
    border-color: var(--saffron);
    background: rgba(255,107,26,.12);
    color: var(--saffron);
  }

  .skills-input-wrapper {
    background: rgba(255,255,255,.06);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 50px;
    cursor: text;
  }
  .skills-input {
    border: none;
    background: transparent;
    outline: none;
    color: var(--white);
    font-size: 13px;
    min-width: 100px;
    flex: 1;
    padding: 4px;
    box-shadow: none;
  }
  .skill-tag {
    background: rgba(255,107,26,.2);
    border: 1px solid rgba(255,107,26,.4);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 12px;
    color: var(--saffron);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .skill-tag span { cursor: pointer; }
  .skills-hint { font-size: 11px; color: var(--gray); margin-top: 4px; }

  .file-upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all .25s;
    background: rgba(255,255,255,.02);
    position: relative;
  }
  .file-upload-area input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .file-upload-icon { font-size: 28px; margin-bottom: 6px; }
  .file-upload-text { font-size: 13px; color: var(--gray); }
  .file-name { font-size: 12px; color: var(--green-light); margin-top: 6px; display: none; }

  .declaration-box {
    background: rgba(19,136,8,.08);
    border: 1px solid rgba(19,136,8,.25);
    border-radius: 12px;
    padding: 20px;
  }
  .declaration-check {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
  }
  .declaration-check input { display: none; }
  .custom-checkbox {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    border: 2px solid var(--gray);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 2px;
  }
  .declaration-check input:checked ~ .custom-checkbox {
    background: var(--green);
    border-color: var(--green);
  }
  .checkmark { font-size: 12px; display: none; }
  .declaration-check input:checked ~ .custom-checkbox .checkmark { display: block; }
  .declaration-text { font-size: 13px; color: var(--gray); line-height: 1.6; }

  .payment-summary {
    background: linear-gradient(135deg, rgba(255,107,26,.1), rgba(255,179,71,.08));
    border: 1px solid rgba(255,107,26,.3);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .payment-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,.06);
    font-size: 14px;
  }
  .payment-row:last-child { border: none; }
  .amount, .total-amount { font-family: 'Syne', sans-serif; }
  .total-amount { color: var(--gold); font-size: 20px; }
  .payment-methods { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .pay-method {
    padding: 10px 20px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    color: var(--gray);
    background: transparent;
  }
  .pay-method.active {
    border-color: var(--saffron);
    color: var(--saffron);
    background: rgba(255,107,26,.1);
  }
  .btn-pay {
    width: 100%;
    padding: 16px;
    font-size: 16px;
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: #fff;
    border-radius: 12px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
  }
  .spinner-overlay { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px; }
  .spinner-overlay.show { display: flex; }
  .spinner {
    width: 48px;
    height: 48px;
    border: 4px solid rgba(255,107,26,.2);
    border-top-color: var(--saffron);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .payment-success { display: none; flex-direction: column; align-items: center; gap: 12px; text-align: center; padding: 24px; }
  .payment-success.show { display: flex; }
  .success-icon { font-size: 52px; }
  .txn-box {
    background: rgba(19,136,8,.1);
    border: 1px solid rgba(19,136,8,.3);
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 13px;
    color: var(--green-light);
  }

  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 13px 28px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--gray);
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--saffron), var(--gold));
    color: #fff;
  }
  .btn-success {
    background: linear-gradient(135deg, var(--green), var(--green-light));
    color: #fff;
  }

  .section-divider { height: 1px; background: var(--border); margin: 24px 0; }
  .info-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,179,71,.1);
    border: 1px solid rgba(255,179,71,.25);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 16px;
  }
  .subsection-title {
    grid-column: 1 / -1;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
    margin-top: 8px;
  }
  .subsection-note {
    grid-column: 1 / -1;
    font-size: 12px;
    color: var(--gray);
    line-height: 1.6;
    margin-top: -8px;
  }
  .feature-block {
    background: rgba(255,255,255,.03);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }
  .feature-block strong {
    display: block;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    margin-bottom: 6px;
  }
  .feature-block span { display: block; font-size: 12px; color: var(--gray); line-height: 1.6; }

  @media (max-width: 600px) {
    .card { padding: 24px 20px; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .step-label { display: none; }
    .btn-row { flex-direction: column-reverse; }
    .btn { width: 100%; }
    .payment-methods { flex-direction: column; }
  }
</style>
</head>
<body data-current-step="{{ current_step|default:'' }}">
<header class="header">
  <div class="header-title">Registration Portal</div>
</header>

<div class="container">
  {% if current_step %}
  <div class="progress-wrapper">
    <div class="steps-row">
      {% for step in steps %}
      <a
        class="step-item{% if step.number == current_step %} active{% elif step.number < current_step %} done{% endif %}"
        data-step="{{ step.number }}"
        data-tooltip="{{ step.tooltip }}"
        href="{% url 'registration-step' step=step.number %}"
      >
        <div class="step-dot">{{ step.number }}</div>
        <div class="step-label">{{ step.label }}</div>
      </a>
      {% endfor %}
    </div>
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script>
  const storageKey = 'registration_portal_data_v3';

  function getData() {
    try {
      return JSON.parse(localStorage.getItem(storageKey) || '{}');
    } catch (error) {
      return {};
    }
  }

  function setData(data) {
    localStorage.setItem(storageKey, JSON.stringify(data));
  }

  function updateData(key, value) {
    const data = getData();
    data[key] = value;
    setData(data);
  }

  function showError(id, show) {
    const el = document.getElementById(id);
    if (el) {
      el.classList.toggle('show', Boolean(show));
    }
  }

  function markField(id, valid) {
    const el = document.getElementById(id);
    if (el) {
      el.classList.toggle('error', !valid);
    }
  }

  function initPersistedFields() {
    const data = getData();

    document.querySelectorAll('[data-persist]').forEach((field) => {
      const key = field.dataset.persist;

      if (field.type === 'radio') {
        field.checked = data[key] === field.value;
        field.addEventListener('change', () => {
          if (field.checked) {
            updateData(key, field.value);
          }
        });
        return;
      }

      if (field.type === 'checkbox') {
        field.checked = Boolean(data[key]);
        field.addEventListener('change', () => updateData(key, field.checked));
        return;
      }

      if (typeof data[key] !== 'undefined') {
        field.value = data[key];
      }

      field.addEventListener('input', () => updateData(key, field.value));
      field.addEventListener('change', () => updateData(key, field.value));
    });
  }

  function validateStep(step) {
    let ok = true;

    if (step === 1) {
      const name = (document.getElementById('fullName') || {}).value?.trim() || '';
      const email = (document.getElementById('email') || {}).value?.trim() || '';
      const mobile = (document.getElementById('mobile') || {}).value?.trim() || '';
      const dob = (document.getElementById('dob') || {}).value || '';
      const gender = document.querySelector('input[name="gender"]:checked');
      const category = document.querySelector('input[name="category"]:checked');

      if (!name) { markField('fullName', false); showError('err-fullName', true); ok = false; } else { markField('fullName', true); showError('err-fullName', false); }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { markField('email', false); showError('err-email', true); ok = false; } else { markField('email', true); showError('err-email', false); }
      if (!/^(\+91)?[6-9]\d{9}$/.test(mobile.replace(/\s/g, ''))) { markField('mobile', false); showError('err-mobile', true); ok = false; } else { markField('mobile', true); showError('err-mobile', false); }
      if (!dob) { markField('dob', false); showError('err-dob', true); ok = false; }
      else {
        const age = (new Date() - new Date(dob)) / (1000 * 60 * 60 * 24 * 365.25);
        if (age < 18) { markField('dob', false); showError('err-dob', true); ok = false; }
        else { markField('dob', true); showError('err-dob', false); }
      }
      showError('err-gender', !gender);
      showError('err-category', !category);
      if (!gender || !category) ok = false;
    }

    if (step === 2) {
      const state = (document.getElementById('state') || {}).value || '';
      const district = (document.getElementById('district') || {}).value?.trim() || '';
      const address = (document.getElementById('address') || {}).value?.trim() || '';
      const pincode = (document.getElementById('pincode') || {}).value?.trim() || '';

      if (!state) { markField('state', false); showError('err-state', true); ok = false; } else { markField('state', true); showError('err-state', false); }
      if (!district) { markField('district', false); showError('err-district', true); ok = false; } else { markField('district', true); showError('err-district', false); }
      if (!address) { markField('address', false); showError('err-address', true); ok = false; } else { markField('address', true); showError('err-address', false); }
      if (!/^\d{6}$/.test(pincode)) { markField('pincode', false); showError('err-pincode', true); ok = false; } else { markField('pincode', true); showError('err-pincode', false); }
    }

    if (step === 3) {
      const q = (document.getElementById('qualification') || {}).value || '';
      const u = (document.getElementById('university') || {}).value?.trim() || '';
      const y = (document.getElementById('passingYear') || {}).value || '';
      const p = (document.getElementById('percentage') || {}).value?.trim() || '';

      if (!q) { markField('qualification', false); showError('err-qualification', true); ok = false; } else { markField('qualification', true); showError('err-qualification', false); }
      if (!u) { markField('university', false); showError('err-university', true); ok = false; } else { markField('university', true); showError('err-university', false); }
      if (!y) { markField('passingYear', false); showError('err-passingYear', true); ok = false; } else { markField('passingYear', true); showError('err-passingYear', false); }
      if (!p) { markField('percentage', false); showError('err-percentage', true); ok = false; } else { markField('percentage', true); showError('err-percentage', false); }
    }

    if (step === 4) {
      const checked = document.querySelectorAll('#jobTypeGroup input:checked').length;
      const exp = document.querySelector('input[name="exp"]:checked');
      const data = getData();
      showError('err-jobType', !checked);
      showError('err-exp', !exp);
      showError('err-skills', !(data.skills || []).length);
      if (!checked || !exp || !(data.skills || []).length) ok = false;
    }

    if (step === 5) {
      const data = getData();
      const resume = Boolean(data.resumeFileName);
      const photo = Boolean(data.photoFileName);
      const idProof = Boolean(data.idFileName);
      const declare = Boolean(data.declareCheck);
      showError('err-resume', !resume);
      showError('err-photo', !photo);
      showError('err-id', !idProof);
      showError('err-declare', !declare);
      if (!resume || !photo || !idProof || !declare) ok = false;
    }

    if (ok) {
      const data = getData();
      data.completedSteps = data.completedSteps || {};
      data.completedSteps[String(step)] = true;
      setData(data);
    }

    return ok;
  }

  function goToNextStep(step, url) {
    if (validateStep(step)) {
      window.location.href = url;
    }
    return false;
  }

  function initYearDropdown() {
    const sel = document.getElementById('passingYear');
    if (!sel || sel.options.length > 1) return;
    const year = new Date().getFullYear();
    for (let y = year; y >= 1985; y -= 1) {
      const option = document.createElement('option');
      option.value = y;
      option.textContent = y;
      sel.appendChild(option);
    }
    const data = getData();
    if (data.passingYear) {
      sel.value = data.passingYear;
    }
  }

  function renderSkills() {
    const wrapper = document.getElementById('skillsWrapper');
    const input = document.getElementById('skillInput');
    if (!wrapper || !input) return;

    wrapper.querySelectorAll('.skill-tag').forEach((tag) => tag.remove());
    const data = getData();
    const skills = data.skills || [];

    skills.forEach((skill) => {
      const tag = document.createElement('div');
      tag.className = 'skill-tag';
      tag.innerHTML = `${skill} <span data-skill-remove="${skill}">x</span>`;
      wrapper.insertBefore(tag, input);
    });

    wrapper.querySelectorAll('[data-skill-remove]').forEach((node) => {
      node.addEventListener('click', (event) => {
        event.stopPropagation();
        removeSkill(node.dataset.skillRemove);
      });
    });
  }

  function addSkill(value) {
    const cleanValue = value.trim().replace(/,$/, '');
    if (!cleanValue) return;
    const data = getData();
    data.skills = data.skills || [];
    if (!data.skills.includes(cleanValue)) {
      data.skills.push(cleanValue);
      setData(data);
      renderSkills();
    }
  }

  function removeSkill(value) {
    const data = getData();
    data.skills = (data.skills || []).filter((item) => item !== value);
    setData(data);
    renderSkills();
  }

  function initSkills() {
    const input = document.getElementById('skillInput');
    if (!input) return;
    renderSkills();
    input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ',') {
        event.preventDefault();
        addSkill(input.value);
        input.value = '';
      }
    });
  }

  function handleFile(inputId, nameId, storageField, areaId) {
    const input = document.getElementById(inputId);
    const nameEl = document.getElementById(nameId);
    const area = document.getElementById(areaId);
    const file = input.files[0];
    if (!file) return;
    updateData(storageField, file.name);
    nameEl.textContent = 'Uploaded: ' + file.name;
    nameEl.style.display = 'block';
    area.style.borderColor = 'var(--green)';
  }

  function initSavedFileNames() {
    const data = getData();
    ['resume', 'photo', 'id'].forEach((prefix) => {
      const fileName = data[prefix + 'FileName'];
      const label = document.getElementById(prefix + 'Name');
      const area = document.getElementById(prefix + 'Area');
      if (fileName && label && area) {
        label.textContent = 'Uploaded: ' + fileName;
        label.style.display = 'block';
        area.style.borderColor = 'var(--green)';
      }
    });
  }

  function selectPayMethod(button) {
    document.querySelectorAll('.pay-method').forEach((item) => item.classList.remove('active'));
    button.classList.add('active');
    updateData('paymentMethod', button.dataset.method);
  }

  function initPaymentMethod() {
    const data = getData();
    if (!data.paymentMethod) return;
    document.querySelectorAll('.pay-method').forEach((item) => {
      item.classList.toggle('active', item.dataset.method === data.paymentMethod);
    });
  }

  function simulatePayment() {
    const spinner = document.getElementById('spinnerOverlay');
    const success = document.getElementById('paymentSuccess');
    const submitRow = document.getElementById('submitRow');
    const payButton = document.getElementById('payBtn');
    const backBeforePay = document.getElementById('backBeforePay');
    if (!spinner || !success || !submitRow || !payButton) return;

    payButton.disabled = true;
    if (backBeforePay) {
      backBeforePay.style.display = 'none';
    }
    spinner.classList.add('show');

    setTimeout(() => {
      spinner.classList.remove('show');
      success.classList.add('show');
      submitRow.style.display = 'flex';
      const txnId = 'TXN' + Date.now().toString().slice(-8);
      document.getElementById('txnId').textContent = txnId;
      updateData('paymentDone', true);
      updateData('txnId', txnId);
    }, 1800);
  }

  function restorePaymentState() {
    const data = getData();
    if (!data.paymentDone) return;
    const success = document.getElementById('paymentSuccess');
    const submitRow = document.getElementById('submitRow');
    const txn = document.getElementById('txnId');
    const payButton = document.getElementById('payBtn');
    const backBeforePay = document.getElementById('backBeforePay');
    if (success && submitRow && txn) {
      success.classList.add('show');
      submitRow.style.display = 'flex';
      txn.textContent = data.txnId || '';
    }
    if (payButton) {
      payButton.disabled = true;
    }
    if (backBeforePay) {
      backBeforePay.style.display = 'none';
    }
  }

  function submitApplication(successUrl) {
    const data = getData();
    const completed = data.completedSteps || {};
    const required = ['1', '2', '3', '4', '5'];
    if (!required.every((step) => completed[step]) || !data.paymentDone) {
      window.location.href = '{% url "registration-step" step=1 %}';
      return false;
    }
    window.location.href = successUrl;
    return false;
  }

  function populateSuccessPage() {
    const page = document.getElementById('successPage');
    if (!page) return;
    const data = getData();
    const appNo = 'GJRP' + new Date().getFullYear() + Math.floor(Math.random() * 9000000 + 1000000);
    document.getElementById('appNo').textContent = appNo;
    document.getElementById('confName').textContent = data.fullName || '-';
    document.getElementById('confEmail').textContent = data.email || '-';
    document.getElementById('confTxn').textContent = data.txnId || '-';
    document.getElementById('confDate').textContent = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  document.addEventListener('DOMContentLoaded', () => {
    initPersistedFields();
    initYearDropdown();
    initSkills();
    initSavedFileNames();
    initPaymentMethod();
    restorePaymentState();
    populateSuccessPage();
  });
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
