{% extends "registration_base.html" %}

{% block content %}
<div class="card">
  <div class="card-header">
    <div class="card-icon">🎓</div>
    <div>
      <div class="card-title">Education Details</div>
      <div class="card-subtitle">Your academic qualifications</div>
    </div>
  </div>
  <div class="form-grid">
    <div class="form-group">
      <label>Highest Qualification <span class="req">*</span></label>
      <select id="qualification" data-persist="qualification">
        <option value="">-- Select --</option>
        <option>10th (Matriculation)</option>
        <option>12th (Intermediate)</option>
        <option>Diploma</option>
        <option>Graduate (B.A. / B.Sc. / B.Com / B.Tech)</option>
        <option>Post Graduate (M.A. / M.Sc. / MBA / M.Tech)</option>
        <option>Ph.D</option>
      </select>
      <span class="error-msg" id="err-qualification">Please select qualification</span>
    </div>
    <div class="form-group">
      <label>Board / University <span class="req">*</span></label>
      <input type="text" id="university" data-persist="university" placeholder="e.g. CBSE, Delhi University">
      <span class="error-msg" id="err-university">Please enter board/university</span>
    </div>
    <div class="form-group">
      <label>Passing Year <span class="req">*</span></label>
      <select id="passingYear" data-persist="passingYear">
        <option value="">-- Year --</option>
      </select>
      <span class="error-msg" id="err-passingYear">Please select year</span>
    </div>
    <div class="form-group">
      <label>Percentage / CGPA <span class="req">*</span></label>
      <input type="text" id="percentage" data-persist="percentage" placeholder="e.g. 75.5% or 8.2 CGPA">
      <span class="error-msg" id="err-percentage">Please enter percentage/CGPA</span>
    </div>
    <div class="form-group">
      <label>Subject / Stream</label>
      <input type="text" id="stream" data-persist="stream" placeholder="e.g. Science, Commerce, Arts">
    </div>
    <div class="form-group">
      <label>Medium of Instruction</label>
      <select id="medium" data-persist="medium">
        <option>Hindi</option><option>English</option><option>Other</option>
      </select>
    </div>
  </div>
  <div class="btn-row">
    <a class="btn btn-outline" href="{% url 'registration-step' step=2 %}">Back</a>
    <a class="btn btn-primary" href="{% url 'registration-step' step=4 %}" onclick="return goToNextStep(3, this.href)">Next: Preferences</a>
  </div>
</div>
{% endblock %}
